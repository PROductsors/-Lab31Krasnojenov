<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Promises & Async/Await Lab</title>
    <style>
        .container { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .data-item { background: #f4f4f4; padding: 5px; margin: 5px 0; border-left: 4px solid #3498db; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Проміси та Async/Await</h1>

    <div class="container">
        <h3>Завдання 2 та 4: Дані з JSONPlaceholder</h3>
        <div id="posts-container">Завантаження даних...</div>
    </div>

    <div class="container">
        <h3>Завдання 5: Паралельні запити (Promise.all)</h3>
        <div id="multi-api-container"></div>
    </div>

    <script>
        //  1: Проміс із затримкою 3 секунди (then) 
        new Promise((resolve) => {
            setTimeout(() => {
                resolve("Завдання 1: Повідомлення через 3 секунди");
            }, 3000);
        }).then(msg => console.log(msg));

        //  3: Проміс із випадковим відхиленням (catch) 
        new Promise((resolve, reject) => {
            const success = Math.random() > 0.5;
            setTimeout(() => {
                success ? resolve("Завдання 3: Успіх!") : reject("Завдання 3: Помилка!");
            }, 1000);
        })
        .then(res => console.log(res))
        .catch(err => console.error(err));

        // Завдання 2 та 4: Async/await та вивід у HTML
        async function fetchAndDisplayData() {
            try {
                const response1 = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                const response2 = await fetch('https://jsonplaceholder.typicode.com/posts/2');
                
                const post1 = await response1.json();
                const post2 = await response2.json();

                console.log("Завдання 2 (Консоль):", post1, post2);

                const container = document.getElementById('posts-container');
                container.innerHTML = `
                    <div class="data-item"><strong>${post1.title}</strong><br>${post1.body}</div>
                    <div class="data-item"><strong>${post2.title}</strong><br>${post2.body}</div>
                `;
            } catch (error) {
                document.getElementById('posts-container').innerHTML = '<span class="error">Помилка завантаження</span>';
            }
        }
        fetchAndDisplayData();

        //  5: Promise.all для трьох різних API
        async function fetchMultipleApis() {
            const urls = [
                'https://jsonplaceholder.typicode.com/users/1',
                'https://jsonplaceholder.typicode.com/todos/1',
                'https://jsonplaceholder.typicode.com/posts/5'
            ];

            try {
                const results = await Promise.all(urls.map(url => fetch(url).then(res => res.json())));
                
                const container = document.getElementById('multi-api-container');
                container.innerHTML = results.map(item => 
                    `<div class="data-item">Завантажено: ${JSON.stringify(item).substring(0, 70)}...</div>`
                ).join('');
                
                console.log("Завдання 5: Всі запити завершені", results);
            } catch (err) {
                console.error("Завдання 5: Помилка в Promise.all", err);
            }
        }
        fetchMultipleApis();
    </script>
</body>
</html>
